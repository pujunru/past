name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # needed to publish a release on tags

env:
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The WinUI head cannot be built with `dotnet build`: the PRI/Appx MSBuild task
      # ships with Visual Studio, not the .NET SDK.
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Test engine
        run: dotnet test tests/Past.Tests/Past.Tests.csproj -c $env:CONFIGURATION --nologo

      - name: Build app
        run: >
          msbuild src/Past.App/Past.App.csproj
          -restore
          -p:Configuration=$env:CONFIGURATION
          -p:Platform=$env:PLATFORM
          -verbosity:minimal

      - name: Stage artifact
        id: stage
        shell: pwsh
        run: |
          $out = Get-ChildItem -Path "src/Past.App/bin/$env:PLATFORM/$env:CONFIGURATION" -Directory |
                 Select-Object -First 1 -ExpandProperty FullName
          if (-not $out) { throw "build output not found" }
          if (-not (Test-Path "$out/Past.App.exe")) { throw "Past.App.exe not found in $out" }
          $zip = "$env:GITHUB_WORKSPACE/Past-$env:PLATFORM.zip"
          Compress-Archive -Path "$out/*" -DestinationPath $zip
          "zip=$zip" >> $env:GITHUB_OUTPUT
          "{0:N1} MB" -f ((Get-Item $zip).Length / 1MB)

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Past-${{ env.PLATFORM }}
          path: ${{ steps.stage.outputs.zip }}
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.stage.outputs.zip }}
          generate_release_notes: true
          body: |
            Unpackaged x64 build. Requires Windows 10 21H2+ / Windows 11.

            Download the zip, extract it anywhere, and run `Past.App.exe`.
            It is self-contained, so no .NET install is needed.

            Press the global hotkey (`Win+Alt+V` by default) to open the clipboard strip.
