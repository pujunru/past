name: build

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write # needed to publish a release on tags

env:
  CONFIGURATION: Release
  PLATFORM: x64

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # The WinUI head cannot be built with `dotnet build`: the PRI/Appx MSBuild task
      # ships with Visual Studio, not the .NET SDK.
      - name: Set up MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Test engine
        run: dotnet test tests/Past.Tests/Past.Tests.csproj -c $env:CONFIGURATION --nologo

      - name: Build app
        run: >
          msbuild src/Past.App/Past.App.csproj
          -restore
          -p:Configuration=$env:CONFIGURATION
          -p:Platform=$env:PLATFORM
          -verbosity:minimal

      - name: Stage build output
        id: stage
        shell: pwsh
        run: |
          $out = Get-ChildItem -Path "src/Past.App/bin/$env:PLATFORM/$env:CONFIGURATION" -Directory |
                 Select-Object -First 1 -ExpandProperty FullName
          if (-not $out) { throw "build output not found" }
          if (-not (Test-Path "$out/Past.App.exe")) { throw "Past.App.exe not found in $out" }
          $zip = "$env:GITHUB_WORKSPACE/Past-$env:PLATFORM.zip"
          Compress-Archive -Path "$out/*" -DestinationPath $zip
          "out=$out" >> $env:GITHUB_OUTPUT
          "zip=$zip" >> $env:GITHUB_OUTPUT

      # Version the installer from the tag (v1.2.3 -> 1.2.3); untagged builds get 0.0.0.
      - name: Resolve version
        id: version
        shell: pwsh
        run: |
          $v = if ($env:GITHUB_REF -like 'refs/tags/v*') { $env:GITHUB_REF -replace '^refs/tags/v','' } else { '0.0.0' }
          "value=$v" >> $env:GITHUB_OUTPUT
          "installer version: $v"

      - name: Build installer
        shell: pwsh
        run: |
          $iscc = @(
            "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe",
            "$env:ProgramFiles\Inno Setup 6\ISCC.exe",
            "$env:LOCALAPPDATA\Programs\Inno Setup 6\ISCC.exe"
          ) | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $iscc) { throw "Inno Setup (ISCC.exe) not found on the runner" }
          & $iscc "installer\Past.iss" `
            "/DSourceDir=${{ steps.stage.outputs.out }}" `
            "/DAppVersion=${{ steps.version.outputs.value }}"
          if ($LASTEXITCODE -ne 0) { throw "ISCC failed with $LASTEXITCODE" }
          if (-not (Test-Path "dist/PastSetup.exe")) { throw "PastSetup.exe was not produced" }
          "{0:N1} MB" -f ((Get-Item "dist/PastSetup.exe").Length / 1MB)

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Past-${{ env.PLATFORM }}
          path: |
            ${{ steps.stage.outputs.zip }}
            dist/PastSetup.exe
          if-no-files-found: error

      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/PastSetup.exe
            ${{ steps.stage.outputs.zip }}
          generate_release_notes: true
          body: |
            Windows 10 21H2+ / Windows 11, x64.

            **Recommended: download `PastSetup.exe` and run it.** It installs per-user (no
            admin prompt), adds a Start menu entry, can start Past when you sign in, and
            registers a normal uninstall entry under "Apps & features".

            `Past-x64.zip` is the raw build if you would rather not install anything —
            extract it and run `Past.App.exe`.

            Both are self-contained, so no .NET install is needed.

            Press `Win+Alt+V` to open the clipboard strip.

            Note: the installer is not code-signed, so SmartScreen may warn on first run —
            choose "More info" then "Run anyway".
